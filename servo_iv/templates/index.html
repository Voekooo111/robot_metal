<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.js"></script>
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/comment/comment.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
</head>

<body>

<form method="POST" id="mainForm">

    <input
        type="hidden"
        id="deleteField"
        name="delete"
        value="">
    <input
        type="hidden"
        id="editField"
        name="edit"
        value="">
    <input
        type="hidden"
        id="action"
        name="action"
        value="">

<div class="grid">

    <!-- ==========================
         CHAT
         ========================== -->

    <div class="chat">

    {% if flag_create %}

    <div class="create-panel">

        <input
            type="text"
            name="function_name"
            class="function-name"
            value="{{ function_name | default('', true) }}"
            placeholder="Впишите название функции">

        <textarea
            name="function_body"
            id="functionBody"
            placeholder="Функция...">{{ function_body | default('', true)}}</textarea>

    </div>

    <div class="input">
        <input
            id="chatInput"
            type="text"
            name="text"
            placeholder="Type..."
            autocomplete="off">
    </div>

    {% else %}

    <div class="message" id="messages">
        {% for m in message %}
            <div class="msg">{{ m }}</div>
        {% endfor %}
    </div>

    <div class="input">
        <input
            id="chatInput"
            type="text"
            name="text"
            placeholder="Type..."
            autocomplete="off">
    </div>

    {% endif %}
    </div>

    <!-- ==========================
         IMAGE + STATUS
         ========================== -->

    <div class="image">

        <div class="status-panel">

            <div class="status-item">
                <span class="status-label">Калибровка</span>

                <span class="status-light {% if flag_calibration %}on calibration{% endif %}"></span>
            </div>

            <div class="status-item">
                <span class="status-label">Создание/изменение функции</span>

                <span class="status-light {% if flag_create %}on create{% endif %}"></span>
            </div>

        </div>

        <div class="image-container">

            <img src="{{ url_for('static', filename='Robot_ph.png') }}"
                 usemap="#image-map"
                 class="no-grab">

            <map name="image-map">

                <area href="/?area=hand_right_0" title="hand_right_0" coords="80,298,224,206" shape="rect">
                <area href="/?area=hand_right_1" title="hand_right_1" coords="294,282,438,194" shape="rect">
                <area href="/?area=hand_right_2" title="hand_right_2" coords="493,266,594,118" shape="rect">

                <area href="/?area=hand_left_0" title="hand_left_0" coords="1069,200,1204,292" shape="rect">
                <area href="/?area=hand_left_1" title="hand_left_1" coords="834,278,982,198" shape="rect">
                <area href="/?area=hand_left_2" title="hand_left_2" coords="696,261,803,132" shape="rect">

                <area href="/?area=leg_right_0" title="leg_right_0" coords="492,997,622,1071" shape="rect">
                <area href="/?area=leg_right_1" title="leg_right_1" coords="495,973,604,902" shape="rect">
                <area href="/?area=leg_right_2" title="leg_right_2" coords="507,849,595,703" shape="rect">
                <area href="/?area=leg_right_3" title="leg_right_3" coords="597,546,499,694" shape="rect">
                <area href="/?area=leg_right_4" title="leg_right_4" coords="492,454,624,372" shape="rect">

                <area href="/?area=leg_left_0" title="leg_left_0" coords="663,1069,789,998" shape="rect">
                <area href="/?area=leg_left_1" title="leg_left_1" coords="678,965,786,901" shape="rect">
                <area href="/?area=leg_left_2" title="leg_left_2" coords="680,836,776,701" shape="rect">
                <area href="/?area=leg_left_3" title="leg_left_3" coords="681,689,775,542" shape="rect">
                <area href="/?area=leg_left_4" title="leg_left_4" coords="796,370,664,459" shape="rect">

                <area href="/?area=hand" title="head" coords="610,132,669,5" shape="rect">

            </map>

        </div>

    </div>

    <!-- ==========================
         BUTTONS
         ========================== -->

    <div class="buttons-column">

        <div class="buttons">

            {% for btn in buttons %}
            <button type="submit"
                    name="button_click"
                    value="{{ btn }}">
                {{ btn }}
            </button>
            {% endfor %}

        </div>

        <div class="user-buttons">

            {% for btn in user_buttons %}

            <div class="user-button-wrapper">

                <button
                    type="submit"
                    class="user-btn"
                    name="button_click"
                    value="{{ btn }}">
                    {{ btn }}
                </button>

                <button
                    type="button"
                    class="edit-btn"
                    onclick="editUserButton('{{ btn }}')">
                    ✎
                </button>

                <button
                    type="button"
                    class="delete-btn"
                    onclick="deleteUserButton('{{ btn }}')">
                    ✕
                </button>

            </div>

            {% endfor %}

        </div>

    </div>

</div>

</form>

<script>
function scrollDown() {
    const box = document.getElementById("messages");
    box.scrollTop = box.scrollHeight;
}

window.onload = function () {

    scrollDown();

    const input = document.getElementById("chatInput");

    if(input)
        input.focus();

    imageMapResize();
};

function deleteUserButton(buttonName){

    if (!confirm(`Вы уверены, что хотите удалить "${buttonName}"?`))
        return;

    document.getElementById("deleteField").value = buttonName;
    document.getElementById("mainForm").submit();
}

function editUserButton(name){

    document.getElementById("editField").value = name;

    document.getElementById("mainForm").submit();

}

const robotWords = {{ robot_words|tojson }};
const robotParts = {{ robot_parts|tojson }};

CodeMirror.registerHelper(
"hint",
"robot",
function(cm){

    const cursor = cm.getCursor();

    const token = cm.getTokenAt(cursor);

    const start = token.start;

    const end = cursor.ch;

    const word = token.string;

    const robotHints = [...robotWords, ...robotParts];

    const list = robotHints.filter(
        x => x.startsWith(word)
    );

    return {

        list:list,

        from:CodeMirror.Pos(cursor.line,start),

        to:CodeMirror.Pos(cursor.line,end)
    };
});

CodeMirror.defineMode("robot", function () {

    return {

        token: function(stream){

            if(stream.eatSpace())
                return null;

            if(stream.match(/#[^\n]*/))
                return "comment";

            if(stream.match(/".*?"/))
                return "string";

            if(stream.match(/[0-9]+/))
                return "number";

            if(stream.match(/[A-Za-z_][A-Za-z0-9_]*/)){

                const word = stream.current();

                if(robotWords.includes(word))
                    return "keyword";
                if(robotParts.includes(word))
                    return "def";

                return "variable";
            }

            stream.next();

            return null;
        }
    };
});

const textarea = document.getElementById("functionBody");
if(textarea){

    const editor = CodeMirror.fromTextArea(
    document.getElementById("functionBody"),
    {
        mode:"robot",
        
        theme:"dark",

        styleActiveLine:true,

        autoCloseBrackets:true,
        
        lineNumbers:true,

        matchBrackets:true,

        indentUnit:4,

        tabSize:4,

        lineWrapping:true,

        extraKeys:{
            Tab:function(cm){
                cm.execCommand("autocomplete");
            },

            "Ctrl-S":function(cm){

                cm.save(); // записывает содержимое CodeMirror обратно в textarea
                document.getElementById("action").value = "save";
                document.getElementById("mainForm").submit();
            },

            "Cmd-S":function(cm){ // для macOS

                cm.save();
                document.getElementById("action").value = "save";
                document.getElementById("mainForm").submit();
            }
        }
    });

    editor.on("inputRead",function(cm){

        cm.showHint({
            completeSingle:false
        });

    });

}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/image-map-resizer/1.0.10/js/imageMapResizer.min.js"></script>

</body>
</html>
